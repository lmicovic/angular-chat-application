<div class="main-container">

    <app-card>
        <!-- Inject HTML to Card component - using ng-content -->
        <div class="card-content">
            
            <div class="logo-container" title="Connectify" [routerLink]="['/home']">
                <span class="brand-mark"><i class="fa-solid fa-layer-group"></i></span>
                <span class="brand-name">Connectify</span>
            </div>

            <div class="settings-container" title="Settings" [routerLink]="['/settings']">
                <i class="fa-solid fa-gear settings-icon"></i>
            </div>

        </div>
        
    </app-card>

</div>
